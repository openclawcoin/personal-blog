name: Deploy Astro to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Compute SITE_URL and SITE_BASE
        shell: bash
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER="${GITHUB_REPOSITORY_OWNER}"

          CUSTOM_DOMAIN=""
          if [ -f "public/CNAME" ]; then
            CUSTOM_DOMAIN="$(head -n 1 public/CNAME | tr -d '\r' | xargs)"
            CUSTOM_DOMAIN="${CUSTOM_DOMAIN#http://}"
            CUSTOM_DOMAIN="${CUSTOM_DOMAIN#https://}"
            CUSTOM_DOMAIN="${CUSTOM_DOMAIN%%/*}"
          fi

          if [ -n "$CUSTOM_DOMAIN" ]; then
            echo "SITE_URL=https://${CUSTOM_DOMAIN}" >> "$GITHUB_ENV"
            echo "SITE_BASE=/" >> "$GITHUB_ENV"
          elif [ "$REPO_NAME" = "${OWNER}.github.io" ]; then
            echo "SITE_URL=https://${OWNER}.github.io" >> "$GITHUB_ENV"
            echo "SITE_BASE=/" >> "$GITHUB_ENV"
          else
            echo "SITE_URL=https://${OWNER}.github.io/${REPO_NAME}" >> "$GITHUB_ENV"
            echo "SITE_BASE=/${REPO_NAME}/" >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Validate blog posts frontmatter
        run: npm run check:posts

      - name: Build site
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
